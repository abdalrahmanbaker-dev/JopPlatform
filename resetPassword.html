<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - JobConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-900">

    
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
            
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 mb-6">
                    <svg class="h-8 w-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Reset Password</h2>
                <p class="mt-3 text-sm text-gray-500 px-4">
                    Please enter your new password to regain access to your account.
                </p>
            </div>

            <form class="mt-8 space-y-5" action="#" method="POST">
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                    <input 
                        id="password"
                        name="password"
                        type="password" 
                        required
                        placeholder="••••••••"
                        class="w-full h-14 px-4 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                    >
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1">Confirm New Password</label>
                    <input 
                        id="confirm-password"
                        name="confirm-password"
                        type="password" 
                        required
                        placeholder="••••••••"
                        class="w-full h-14 px-4 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                    >
                </div>

                <div class="pt-4">
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-lg hover:shadow-indigo-200">
                        Update Password
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <div class="mt-4 border-t border-gray-100 pt-4">
                    <a href="UserLogin.html" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors italic">
                        Cancel and return to Login
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 Doroop. All rights reserved.
    </footer>

</body>
</html>
