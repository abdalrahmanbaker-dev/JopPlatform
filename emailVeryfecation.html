<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - JobConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom spacing for the unified OTP field */
        .otp-input {
            letter-spacing: 1.2rem; /* Space between numbers */
            padding-left: 1.2rem;   /* Balanced padding for LTR */
            font-family: monospace; /* Fixed-width font for consistent spacing */
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-900">

    

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
            
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 mb-6">
                    <svg class="h-8 w-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Verify Your Email</h2>
                <p class="mt-3 text-sm text-gray-500">
                    Enter the 6-digit code sent to your email address
                </p>
            </div>

            <form class="mt-8 space-y-6" action="#" method="POST">
                <div class="relative">
                    <input 
                        type="text" 
                        maxlength="6" 
                        inputmode="numeric" 
                        pattern="[0-9]*"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        placeholder="000000"
                        class="otp-input w-full h-16 text-center text-3xl font-bold border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                    >
                    <div class="mt-2 text-center text-xs text-gray-400">Please enter digits only</div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-lg hover:shadow-indigo-200">
                        Verify Account
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    Didn't receive the code? 
                    <button class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors ml-1">
                        Resend Code
                    </button>
                </p>
                <div class="mt-4">
                    <a href="UserSignUp.html" class="text-xs text-gray-400 hover:underline italic">Back to signUp</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 Doroop. All rights reserved.
    </footer>

</body>
</html>
