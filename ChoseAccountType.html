<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Chose</title>
</head>

<body>
  <section class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-6">
    <div class="max-w-4xl w-full">

      <div class="text-center mb-12">
        <h2 class="text-5xl font-extrabold text-indigo-800 mb-4">Join Our Community</h2>
        <p class="text-gray-600 text-lg">Choose how you want to use the platform</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

        <a href="UserSignUp.html"
          class="flex flex-col items-center p-10 bg-white border-2 border-transparent rounded-3xl shadow-sm hover:border-indigo-800 hover:shadow-xl transition-all duration-300 group">
          <div
            class="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-800 transition-colors duration-300">
            <i class="fa-solid fa-user  text-4xl text-indigo-800 group-hover:text-white "></i>
          </div>
          <h3 class="text-2xl font-bold text-gray-800 mb-3">Job Seeker</h3>
          <p class="text-gray-500 text-center mb-6">I am looking for my next dream job and career growth.</p>
          <span
            class="px-6 py-2 bg-indigo-50 text-indigo-800 font-semibold rounded-full group-hover:bg-indigo-800 group-hover:text-white transition-all">Select</span>
        </a>

        <a href="#"
          class="flex flex-col items-center p-10 bg-white border-2 border-transparent rounded-3xl shadow-sm hover:border-indigo-800 hover:shadow-xl transition-all duration-300 group text-center">
          <div
            class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-800 transition-colors duration-300">
            <i class="fa-solid fa-building text-4xl text-indigo-800 group-hover:text-white"></i>
          </div>
          <h3 class="text-2xl font-bold text-gray-800 mb-3">Company</h3>
          <p class="text-gray-500 text-center mb-6">I am looking to hire top talent and build my team.</p>
          <span
            class="px-6 py-2 bg-blue-50 text-indigo-800 font-semibold rounded-full group-hover:bg-indigo-800 group-hover:text-white transition-all">Select</span>
        </a>

      </div>

      <p class="text-center mt-10 text-gray-500">
        Already have an account? <a href="UserLogin.html" class="text-indigo-800 font-bold hover:underline">Log In</a>
      </p>
    </div>
  </section>
</body>

</html>
