<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Reset Code - JobConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Unified OTP field spacing */
        .otp-input {
            letter-spacing: 1.2rem; 
            padding-left: 1.2rem;   
            font-family: monospace; 
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-900">

    
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
            
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 mb-6">
                    <svg class="h-8 w-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Check Your Email</h2>
                <p class="mt-3 text-sm text-gray-500">
                    We've sent a 6-digit reset code to your inbox. Enter it below to proceed.
                </p>
            </div>

            <form class="mt-8 space-y-6" action="#" method="POST">
                <div class="relative">
                    <input 
                        type="text" 
                        maxlength="6" 
                        inputmode="numeric" 
                        pattern="[0-9]*"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        placeholder="000000"
                        class="otp-input w-full h-16 text-center text-3xl font-bold border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all"
                    >
                    <div class="mt-2 text-center text-xs text-gray-400 italic">Enter the code from your email</div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-lg hover:shadow-indigo-200">
                        Continue to Reset
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    Didn't get the code? 
                    <button class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors ml-1">
                        Resend Code
                    </button>
                </p>
                

            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 Doroop. All rights reserved.
    </footer>

</body>
</html>
