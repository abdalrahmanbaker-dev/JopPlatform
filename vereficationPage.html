<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | Doroop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 p-8 text-center transition-all">

        <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-envelope-open-text text-3xl text-indigo-900"></i>
        </div>

        <h2 class="text-2xl font-black text-indigo-950 mb-2 tracking-tight">Check your email</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            We've sent a 4-digit verification code to <br>
            <span class="font-bold text-indigo-900">abd***@example.com</span>
        </p>

        <form id="verifyForm" class="space-y-8">
            <div class="flex justify-center gap-3">
                <input type="text" maxlength="1"
                    class="otp-input w-14 h-14 text-center text-2xl font-bold bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-600 focus:bg-white focus:outline-none transition-all shadow-sm">
                <input type="text" maxlength="1"
                    class="otp-input w-14 h-14 text-center text-2xl font-bold bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-600 focus:bg-white focus:outline-none transition-all shadow-sm">
                <input type="text" maxlength="1"
                    class="otp-input w-14 h-14 text-center text-2xl font-bold bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-600 focus:bg-white focus:outline-none transition-all shadow-sm">
                <input type="text" maxlength="1"
                    class="otp-input w-14 h-14 text-center text-2xl font-bold bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-600 focus:bg-white focus:outline-none transition-all shadow-sm">
            </div>

            <button type="submit"
                class="w-full bg-indigo-950 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-900 transition-all active:scale-[0.98]">
                Verify Account
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-500">
            Didn't receive the code?
            <button class="text-indigo-900 font-bold hover:underline">Resend code</button>
        </p>

        <a href="UserLogin.html"
            class="inline-flex items-center gap-2 mt-6 text-xs text-gray-400 hover:text-indigo-900 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Login
        </a>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');

        // منطق التنقل التلقائي بين المربعات
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && index > 0 && !e.target.value) {
                    inputs[index - 1].focus();
                }
            });
        });

        // عند النشر (Verification)
        document.getElementById('verifyForm').onsubmit = (e) => {
            e.preventDefault();
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === 4) {
                alert("Verification Code: " + code);
                // هنا تنقل المستخدم للصفحة التالية
            } else {
                alert("Please enter the full 4-digit code");
            }
        }
    </script>

</body>

</html>
