<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | JobConnect</title>
</head>

<body class="bg-gray-50 antialiased font-sans">

    <div class="min-h-screen flex items-center justify-center p-2">
        <div class="bg-white w-full max-w-6xl h-[700px] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row">

            <div class="hidden md:flex md:w-1/2 relative overflow-hidden bg-indigo-900">
                <img src="src/pexels-kampus-8353789.jpg" alt="Professional Career"
                    class="absolute inset-0 w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-indigo-950 via-transparent to-transparent"></div>
                <div class="relative z-10 p-16 flex flex-col justify-end h-full text-white">
                    <h1 class="text-4xl text-center lg:text-5xl font-extrabold mb-6 leading-tight">
                        Welcome back, <br> <span class="text-indigo-700">Future Builder</span>
                    </h1>
                    <p class="text-indigo-100 text-lg max-w-md leading-relaxed">
                        Your next career milestone is waiting for you. Log in to see who’s looking for your skills today
                    </p>
                </div>
            </div>

            <div class="w-full md:w-1/2 p-4 lg:p-10 flex flex-col justify-center bg-white">
                <img src="src/5.png" alt="Logo" class="w-40 mx-auto ">

                <div class="mb-10 text-center">
                    <h2 class="text-3xl font-bold mb-2 text-indigo-900">Login to Account</h2>
                    <p class="text-indigo-900">Please enter your credentials to continue</p>
                </div>

                <form action="/Account/Login" method="POST" class="space-y-2">
                    
                    <div>
                        <label class="block text-sm font-semibold text-indigo-900 mb-2 px-5">Email Address</label>
                        <input type="email" name="Email" id="Email" placeholder="name@example.com"
                            class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:bg-white focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all" required>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-sm font-semibold text-indigo-900 px-5">Password</label>
                            <a href="vereficationPage.html" class="text-sm text-indigo-600 font-bold hover:underline">Forgot?</a>
                        </div>
                        <input type="password" name="Password" id="Password" placeholder="••••••••"
                            class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:bg-white focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all " required>
                    </div>

                    <div class="relative mb-8 text-center">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-100"></div>
                        </div>
                        <span class="relative bg-white px-4 text-sm text-gray-400 uppercase tracking-widest">Or login with Email</span>
                    </div>

                    <button type="button"
                        class="w-full flex items-center justify-center gap-3 py-3.5 border border-gray-200 rounded-2xl hover:bg-gray-50 transition-all shadow-sm active:scale-[0.98] mb-8 font-semibold text-gray-700">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6">
                        Sign in with Google
                    </button>

                    <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-[0.99] mt-4">
                        Login 
                    </button>
                </form>

                <p class="text-center mt-10 text-gray-500">
                    Don't have an account? <a href="UserSignUp.html" class="text-indigo-600 font-extrabold hover:underline">Sign Up</a>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
