<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Company | Doroop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .preview-img { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <div class="mb-8 border-b border-gray-200 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-blue-800">Register Your Company</h1>
                <p class="text-gray-500 italic">Doroop - Professional Networking Platform</p>
            </div>
            <img src="src/5.png" alt="Logo" class="h-14 ">
        </div>

        <form id="companyForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold text-gray-800 border-l-4 border-blue-800 pl-3">General Info</h2>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" name="Name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-800 focus:border-blue-800 outline-none transition-all"
                        placeholder="e.g. Doroop Software">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Official Email</label>
                    <input type="email" name="Email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-800 focus:border-blue-800 outline-none transition-all"
                        placeholder="hr@doroop.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea name="Description" rows="6" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-800 focus:border-blue-800 outline-none transition-all"
                        placeholder="Describe your company mission..."></textarea>
                </div>
            </div>

            <div class="space-y-6">
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class=" font-semibold text-gray-800 border-l-4 border-blue-800 pl-3 mb-4 text-lg">Cover Image</h2>
                    <div id="coverContainer" class="relative group h-44 w-full bg-blue-50 rounded-xl border-2 border-dashed border-blue-200 flex items-center justify-center overflow-hidden hover:border-blue-800 transition-all cursor-pointer">
                        <div id="coverPlaceholder" class="text-center group-hover:scale-110 transition-transform">
                            <i class="fas fa-cloud-upload-alt text-blue-400 text-3xl mb-2"></i>
                            <p class="text-xs text-blue-800 font-semibold uppercase tracking-wider">Upload Cover</p>
                        </div>
                        <img id="coverPreview" class="hidden preview-img absolute inset-0">
                        <input type="file" id="coverInput" name="CoverImage" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class=" font-semibold text-gray-800 border-l-4 border-blue-800 pl-3 mb-4 text-lg ">Profile Logo</h2>
                    <div class="flex items-center space-x-6">
                        <div id="logoContainer" class="h-28 w-28 bg-blue-50 rounded-full border-2 border-dashed border-blue-200 flex items-center justify-center relative group overflow-hidden shrink-0">
                            <i id="logoPlaceholder" class="fas fa-camera text-blue-300 text-2xl group-hover:text-blue-800 transition-colors"></i>
                            <img id="logoPreview" class="hidden preview-img absolute inset-0 rounded-full scale-105">
                            <input type="file" id="logoInput" name="ProfileImage" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-bold text-gray-700">Company Logo</p>
                            <p class="text-xs text-gray-500 leading-relaxed mt-1">Recommended size: 512x512px. <br> Supports PNG, JPG or WEBP.</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="submit" 
                        class="flex-1 bg-blue-800 hover:bg-blue-900 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-check-circle"></i> Create Company
                    </button>
                    <button type="button" onclick="window.location.href='index.html'"
                        class="px-8 py-4 border border-gray-300 rounded-2xl text-gray-600 font-medium hover:bg-gray-100 transition-all">
                        Cancel
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Function to handle image preview
        function setupPreview(inputId, previewId, placeholderId) {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            const placeholder = document.getElementById(placeholderId);

            input.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.classList.remove('hidden');
                        if(placeholder) placeholder.classList.add('hidden');
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        // Apply previews
        setupPreview('coverInput', 'coverPreview', 'coverPlaceholder');
        setupPreview('logoInput', 'logoPreview', 'logoPlaceholder');

        // Form Submit
        document.getElementById('companyForm').onsubmit = (e) => {
            e.preventDefault();
            console.log("Submitting company data...");
            // Here you would use fetch() to send the FormData to your .NET Controller
        };
    </script>

</body>
</html>
